name: Build, Scan and Push Docker Images to ECR

on:
 # push:
  #  branches:
   #   - main
  #  paths:
  #    - 'services/**'

 # pull_request:
  #  branches:
  #    - main
  #  paths:
   #   - 'services/**'

  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - dashboard-api
          - inventory-service
          - notification-service
          - order-service
          - payment-service
          - scheduler
          - shipping-service
          - worker

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SERVICE: ${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$SERVICE:$IMAGE_TAG"

          docker build \
            -t "$IMAGE_URI" \
            -t "$ECR_REGISTRY/$SERVICE:v1" \
            ./services/$SERVICE

          echo "image-ref=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Save Docker Image
        run: |
          docker save \
            -o ${{ matrix.service }}.tar \
            ${{ steps.build-image.outputs.image-ref }}

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.build-image.outputs.image-ref }}
          format: sarif
          output: trivy-results-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload SARIF Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          category: trivy-${{ matrix.service }}
          sarif_file: trivy-results-${{ matrix.service }}.sarif

     
      - name: Push Docker Image to ECR
        if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SERVICE: ${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$SERVICE:$IMAGE_TAG
          docker push $ECR_REGISTRY/$SERVICE:v1

      #  confirm the image actually landed in ECR rather than trusting
      # a green "docker push" step alone.
      - name: Verify Image Exists in ECR
        if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          SERVICE: ${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecr describe-images \
            --repository-name "$SERVICE" \
            --image-ids imageTag="$IMAGE_TAG" \
            --region "$AWS_REGION" \
            --query 'imageDetails[0].{tag:imageTags, pushedAt:imagePushedAt, digest:imageDigest}' \
            --output table

    

  
  