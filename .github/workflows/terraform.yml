name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, prod]
        default: dev
      action:
        description: "Select Terraform action"
        required: true
        type: choice
        options: [plan, apply, destroy]
        default: plan

concurrency:
  group: terraform-${{ github.event.inputs.environment || 'dev' }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    name: "Terraform Infrastructure"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: ./terraform/environments/${{ github.event.inputs.environment || 'dev' }}
    env:
      AWS_REGION: eu-west-2
      TF_VERSION: 1.13.3
      TF_ENV: ${{ github.event.inputs.environment || 'dev' }}
      TF_STATE_KEY: envs/${{ github.event.inputs.environment || 'dev' }}/ecs/terraform.tfstate
    permissions:
      id-token: write
      contents: read
      security-events: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_ENV == 'prod' && secrets.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.S3_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.52.0
          cache: true

      - name: Terraform Lint
        run: |
          tflint --init
          tflint

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Run Checkov action
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/environments/${{ env.TF_ENV }}
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: true
          check: HIGH,CRITICAL

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: results.sarif

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
        run: terraform plan -var-file="terraform.tfvars" -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file="terraform.tfvars" -auto-approve